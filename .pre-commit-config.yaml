repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-docs-updated
        name: Check docs updated with source changes
        entry: bash scripts/check-docs-updated.sh
        language: system
        pass_filenames: false
        always_run: true
